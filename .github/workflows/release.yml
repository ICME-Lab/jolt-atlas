name: Release CLI binaries

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: jolt-atlas-linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset: jolt-atlas-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: jolt-atlas-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: jolt-atlas-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --locked --bin jolt-atlas --target ${{ matrix.target }}
      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist/package
          bin="target/${{ matrix.target }}/release/jolt-atlas"
          exe="jolt-atlas"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            bin="${bin}.exe"
            exe="jolt-atlas.exe"
          fi
          cp "$bin" "dist/package/$exe"
          tar -czf "dist/${{ matrix.asset }}.tar.gz" -C dist/package "$exe"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}.tar.gz

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
